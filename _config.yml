title: ledgerwerk
description: Practical notes .
url: "https://ledgerwerk.de"
baseurl: ""

markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

exclude:
  - .direnv
  - .git
  - .gitignore
  - _site
  - Gemfile
  - Gemfile.lock
  - Justfile
  - README.md
  - jekyll_starter.md

collections:
  pages:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: default
