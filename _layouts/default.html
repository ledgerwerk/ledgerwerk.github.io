<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">ledgerwerk</a>
      <nav aria-label="Main navigation">
        <a href="{{ '/tools/' | relative_url }}">Tools</a>
        <a href="{{ '/tools/releaseledger/' | relative_url }}">releaseledger</a>
        <a href="{{ '/tools/archledger/' | relative_url }}">archledger</a>
        <a href="{{ '/impressum/' | relative_url }}">Impressum</a>
        <a href="{{ '/datenschutz/' | relative_url }}">Datenschutz</a>
      </nav>
    </header>
    <main class="page">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>Practical ledger tooling for coding workflows.</p>
    </footer>
  </body>
</html>
