[codecrate]
output = "context_ledgerwerk_github_io.md"
keep_docstrings = true
dedupe = true
respect_gitignore = true
# exclude = ["*/.venv/*", "integration_tests", "examples", "docs"]
gitignore_allow = []
exclude = ["*/.venv/*", "integration_tests", "todo.md"]
include = ["**/*.yml", "**/*.toml", "**/*.rst", "**/*.md", "**/*.js", "**/*.css", "**/*.html", "**/*.conf"]
split_max_chars = 0
manifest = false
layout = "full"
profile = "portable-agent"
emit_standalone_unpacker = true
